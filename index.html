<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="PHUL" />
<meta name="theme-color" content="#0e1116" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<title>PHUL — Lift & Fuel</title>
<style>
  :root{
    --bg:#0e1116; --bg2:#161b22; --bg3:#1d2430; --line:#262d3a;
    --txt:#e8edf4; --mut:#8b97a8; --mut2:#5c6776;
    --acc:#3ddc84; --acc-d:#2bb56a; --blue:#4aa3ff; --amber:#ffb454;
    --red:#ff5d6c; --purple:#b894ff;
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
  body{padding-bottom:calc(72px + var(--safe-b))}
  h1,h2,h3{margin:0;font-weight:700}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit;font-size:16px}
  .app{max-width:560px;margin:0 auto;min-height:100vh}
  .hide{display:none!important}

  /* header */
  header.top{position:sticky;top:0;z-index:30;background:rgba(14,17,22,.85);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    padding:calc(var(--safe-t) + 14px) 18px 12px;border-bottom:1px solid var(--line)}
  header.top h1{font-size:22px;letter-spacing:-.5px;display:flex;align-items:center;gap:8px}
  header.top .sub{color:var(--mut);font-size:13px;margin-top:2px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--acc);box-shadow:0 0 10px var(--acc)}

  /* views */
  .view{padding:16px 16px 24px;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* cards */
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}
  .card h2{font-size:16px;margin-bottom:10px}
  .card h3{font-size:14px;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
  .row{display:flex;align-items:center;gap:10px}
  .between{justify-content:space-between}
  .muted{color:var(--mut)} .small{font-size:13px} .tiny{font-size:11px}

  /* pills / chips */
  .chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;
    background:var(--bg3);font-size:12px;font-weight:600;color:var(--mut)}
  .chip.acc{background:rgba(61,220,132,.15);color:var(--acc)}
  .chip.blue{background:rgba(74,163,255,.15);color:var(--blue)}
  .chip.amber{background:rgba(255,180,84,.15);color:var(--amber)}
  .chip.purple{background:rgba(184,148,255,.15);color:var(--purple)}

  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:13px 16px;border-radius:13px;font-weight:700;font-size:15px;
    background:var(--bg3);color:var(--txt);transition:transform .08s,filter .15s}
  .btn:active{transform:scale(.97)}
  .btn.primary{background:var(--acc);color:#04150b}
  .btn.block{width:100%}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--mut)}
  .btn.sm{padding:8px 12px;font-size:13px;border-radius:10px}
  .btn.danger{background:rgba(255,93,108,.15);color:var(--red)}

  /* calendar */
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .calhead .m{font-size:18px;font-weight:700}
  .navbtn{width:38px;height:38px;border-radius:12px;background:var(--bg2);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--mut)}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
  .dow div{text-align:center;font-size:11px;color:var(--mut2);font-weight:700}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cell{aspect-ratio:1/1;border-radius:12px;background:var(--bg2);border:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    position:relative;font-size:14px;font-weight:600;transition:transform .08s}
  .cell:active{transform:scale(.93)}
  .cell.out{opacity:.28}
  .cell.today{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc) inset}
  .cell .tag{position:absolute;bottom:6px;width:7px;height:7px;border-radius:50%}
  .cell .tag.up{background:var(--blue)} .cell .tag.lo{background:var(--amber)}
  .cell .tag.hike{background:var(--acc)} .cell .tag.oth{background:var(--purple)} .cell .tag.done{box-shadow:0 0 0 2px var(--acc)}
  .cell .check{position:absolute;top:4px;right:5px;font-size:10px;color:var(--acc)}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;font-size:12px;color:var(--mut)}
  .legend .row{gap:6px}
  .ld{width:9px;height:9px;border-radius:50%}

  /* exercise log */
  .ex{border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden;background:var(--bg2)}
  .ex .exh{padding:13px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .ex .exh .nm{font-weight:700;font-size:15px}
  .ex .exh .scheme{font-size:12px;color:var(--mut);margin-top:2px}
  .ex .last{font-size:11px;color:var(--acc);margin-top:3px}
  .setrow{display:grid;grid-template-columns:34px 1fr 1fr 44px;gap:8px;align-items:center;
    padding:8px 14px;border-top:1px solid var(--line)}
  .setrow .sn{color:var(--mut2);font-size:13px;font-weight:700;text-align:center}
  .setrow input{width:100%;background:var(--bg3);border:1px solid var(--line);border-radius:9px;
    padding:9px;color:var(--txt);text-align:center;font-weight:600}
  .setrow input:focus{outline:none;border-color:var(--acc)}
  .setrow .ck{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--bg3);
    display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--mut2)}
  .setrow .ck.on{background:var(--acc);color:#04150b;border-color:var(--acc)}
  .setlbl{display:grid;grid-template-columns:34px 1fr 1fr 44px;gap:8px;padding:4px 14px 0;font-size:10px;color:var(--mut2);text-transform:uppercase;letter-spacing:.5px;text-align:center}
  .exfoot{padding:10px 14px;border-top:1px solid var(--line);display:flex;gap:8px}

  /* meals */
  .meal{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line)}
  .meal:last-child{border-bottom:none}
  .meal .mn{font-weight:600;font-size:14px}
  .meal .mm{font-size:12px;color:var(--mut);margin-top:2px}
  .meal .cal{font-weight:700;font-size:15px}

  /* progress bars */
  .bar{height:8px;border-radius:999px;background:var(--bg3);overflow:hidden;margin-top:6px}
  .bar i{display:block;height:100%;border-radius:999px;transition:width .4s}
  .macro{margin-bottom:12px}
  .macro .lbl{display:flex;justify-content:space-between;font-size:13px}
  .macro .lbl b{font-weight:700}

  .ring-wrap{display:flex;justify-content:center;margin:4px 0 8px}

  /* water */
  .water{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
  .cup{width:30px;height:38px;border:2px solid var(--line);border-radius:5px 5px 8px 8px;
    position:relative;overflow:hidden;background:var(--bg3)}
  .cup.full{border-color:var(--blue)}
  .cup.full::after{content:"";position:absolute;inset:0;background:var(--blue);opacity:.85}

  /* supp toggle */
  .supp{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
  .supp:last-child{border-bottom:none}
  .toggle{width:50px;height:30px;border-radius:999px;background:var(--bg3);border:1px solid var(--line);position:relative;transition:background .2s}
  .toggle.on{background:var(--acc)}
  .toggle::after{content:"";position:absolute;top:2px;left:2px;width:24px;height:24px;border-radius:50%;background:#fff;transition:transform .2s}
  .toggle.on::after{transform:translateX(20px)}

  /* stats */
  .stat{text-align:center;flex:1}
  .stat .n{font-size:24px;font-weight:800}
  .stat .l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .barchart{display:flex;align-items:flex-end;gap:6px;height:120px;margin-top:8px}
  .barchart .b{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end}
  .barchart .b i{width:100%;background:var(--acc);border-radius:5px 5px 0 0;min-height:3px;transition:height .4s}
  .barchart .b span{font-size:10px;color:var(--mut2)}

  /* segmented toggle */
  .seg{display:flex;background:var(--bg3);border-radius:11px;padding:3px;gap:3px}
  .seg button{flex:1;padding:9px;border-radius:9px;font-weight:700;font-size:14px;color:var(--mut)}
  .seg button.on{background:var(--acc);color:#04150b}

  /* bottom nav */
  nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:40;
    background:rgba(14,17,22,.92);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border-top:1px solid var(--line);display:flex;padding:8px 6px calc(8px + var(--safe-b))}
  nav.tabs .max{max-width:560px;margin:0 auto;width:100%;display:flex}
  nav.tabs button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:6px 0;color:var(--mut2);font-size:10px;font-weight:600}
  nav.tabs button svg{width:24px;height:24px}
  nav.tabs button.active{color:var(--acc)}

  /* modal / sheet */
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;opacity:0;
    pointer-events:none;transition:opacity .25s}
  .backdrop.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--bg2);
    border-radius:22px 22px 0 0;border-top:1px solid var(--line);
    max-width:560px;margin:0 auto;padding:8px 18px calc(24px + var(--safe-b));
    transform:translateY(110%);transition:transform .3s cubic-bezier(.22,1,.36,1);max-height:88vh;overflow-y:auto}
  .sheet.show{transform:none}
  .sheet .grab{width:38px;height:5px;border-radius:3px;background:var(--line);margin:8px auto 14px}
  .sheet h2{font-size:19px;margin-bottom:14px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;color:var(--mut);margin-bottom:6px;font-weight:600}
  .field input,.field select{width:100%;background:var(--bg3);border:1px solid var(--line);
    border-radius:11px;padding:13px;color:var(--txt)}
  .field input:focus,.field select:focus{outline:none;border-color:var(--acc)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

  .empty{text-align:center;color:var(--mut2);padding:34px 10px;font-size:14px}
  .empty .big{font-size:34px;margin-bottom:8px}

  /* barcode scanner */
  .scan-overlay{position:fixed;inset:0;z-index:90;background:#000;display:flex;flex-direction:column}
  .scan-overlay video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .scan-top{position:relative;z-index:2;display:flex;justify-content:space-between;align-items:center;
    padding:calc(var(--safe-t) + 14px) 18px 14px;color:#fff;font-size:14px;font-weight:600;
    background:linear-gradient(rgba(0,0,0,.6),transparent)}
  .scan-top button{color:#fff;font-weight:700}
  .scan-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:76%;max-width:340px;height:150px;
    border:3px solid var(--acc);border-radius:16px;box-shadow:0 0 0 2000px rgba(0,0,0,.4);z-index:1}
  .scan-actions{position:absolute;bottom:calc(var(--safe-b) + 26px);left:0;right:0;z-index:2;
    display:flex;gap:12px;justify-content:center}
  .scanbtn{background:rgba(255,255,255,.16);color:#fff;backdrop-filter:blur(6px);font-weight:700}

  .install{position:sticky;top:0;background:var(--acc);color:#04150b;padding:10px 14px;
    font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .install button{font-weight:800}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <h1><span class="dot"></span> <span id="hTitle">PHUL</span></h1>
    <div class="sub" id="hSub">Power Hypertrophy Upper Lower</div>
  </header>

  <!-- ===== CALENDAR ===== -->
  <section id="v-cal" class="view">
    <div class="card" id="todayCard"></div>
    <div class="card">
      <div class="calhead">
        <button class="navbtn" onclick="shiftMonth(-1)">‹</button>
        <div class="m" id="calMonth"></div>
        <button class="navbtn" onclick="shiftMonth(1)">›</button>
      </div>
      <div class="dow"><div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div></div>
      <div class="grid" id="calGrid"></div>
      <div class="legend">
        <div class="row"><span class="ld" style="background:var(--blue)"></span>Upper</div>
        <div class="row"><span class="ld" style="background:var(--amber)"></span>Lower</div>
        <div class="row"><span class="ld" style="background:var(--acc)"></span>Hike</div>
        <div class="row"><span class="ld" style="box-shadow:0 0 0 2px var(--acc);background:transparent"></span>Completed</div>
      </div>
    </div>
  </section>

  <!-- ===== WORKOUT ===== -->
  <section id="v-work" class="view hide"></section>

  <!-- ===== DIET ===== -->
  <section id="v-diet" class="view hide"></section>

  <!-- ===== STATS ===== -->
  <section id="v-stats" class="view hide"></section>
</div>

<nav class="tabs">
  <div class="max">
    <button data-tab="cal" class="active" onclick="go('cal')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>Calendar</button>
    <button data-tab="work" onclick="go('work')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.5 6.5l11 11M5 11l-2 2 3 3 2-2M19 13l2-2-3-3-2 2M9 4l2-2 3 3-2 2M15 20l-2 2-3-3 2-2"/></svg>Workout</button>
    <button data-tab="diet" onclick="go('diet')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM6 1v3M10 1v3M14 1v3"/></svg>Diet</button>
    <button data-tab="stats" onclick="go('stats')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18M7 14l4-4 3 3 5-6"/></svg>Stats</button>
  </div>
</nav>

<div class="backdrop" id="backdrop" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>

<div id="scanOverlay" class="scan-overlay hide">
  <div class="scan-top"><button onclick="closeScanner()">✕ Close</button><span id="scanStatus">Starting camera…</span></div>
  <video id="scanVideo" playsinline muted autoplay></video>
  <div class="scan-frame"></div>
  <div class="scan-actions">
    <label class="btn sm scanbtn">📷 Photo<input type="file" accept="image/*" capture="environment" style="display:none" onchange="scanPhoto(this.files[0])"></label>
    <button class="btn sm scanbtn" onclick="manualBarcode()">⌨︎ Enter #</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>

<script>
/* ============================================================
   PHUL — local-first workout / diet tracker (PWA)
   All data lives in localStorage on this device. No accounts.
   ============================================================ */

/* ---------- storage ---------- */
const DB = {
  get(k,d){ try{ const v=localStorage.getItem('phul.'+k); return v?JSON.parse(v):d; }catch(e){ return d; } },
  set(k,v){ localStorage.setItem('phul.'+k, JSON.stringify(v)); }
};
const todayKey = (d=new Date())=> d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const keyToDate = k => { const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); };

/* ---------- PHUL program (free-weight lower days — no leg machines) ---------- */
const DEFAULT_PROGRAM = {
  upperPower:{ name:'Upper Power', type:'upper', ex:[
    {n:'Barbell Bench Press', s:'3–4 × 3–5'},
    {n:'Bent-Over Barbell Row', s:'3–4 × 3–5'},
    {n:'Overhead Press', s:'2–3 × 5–8'},
    {n:'Weighted Pull-Up / Lat Pulldown', s:'2–3 × 6–10'},
    {n:'Barbell Curl', s:'2–3 × 6–10'},
    {n:'Skullcrusher', s:'2–3 × 6–10'},
  ]},
  lowerPower:{ name:'Lower Power', type:'lower', ex:[
    {n:'Back Squat', s:'3–4 × 3–5'},
    {n:'Deadlift', s:'3–4 × 3–5'},
    {n:'Romanian Deadlift', s:'3–4 × 6–10'},
    {n:'Bulgarian Split Squat', s:'3 × 8–10'},
    {n:'Dumbbell Standing Calf Raise', s:'3–4 × 8–12'},
  ]},
  upperHyper:{ name:'Upper Hypertrophy', type:'upper', ex:[
    {n:'Incline Barbell Bench', s:'3–4 × 8–12'},
    {n:'Flat Dumbbell Fly', s:'3–4 × 8–12'},
    {n:'Seated Cable Row', s:'3–4 × 8–12'},
    {n:'One-Arm Dumbbell Row', s:'3–4 × 8–12'},
    {n:'Dumbbell Lateral Raise', s:'3–4 × 8–12'},
    {n:'Incline Dumbbell Curl', s:'3–4 × 8–12'},
    {n:'Cable Tricep Pushdown', s:'3–4 × 8–12'},
  ]},
  lowerHyper:{ name:'Lower Hypertrophy', type:'lower', ex:[
    {n:'Front Squat', s:'3–4 × 8–12'},
    {n:'Dumbbell Walking Lunge', s:'3–4 × 8–12'},
    {n:'Goblet Squat', s:'3 × 10–15'},
    {n:'Dumbbell Romanian Deadlift', s:'3–4 × 10–15'},
    {n:'Single-Leg Dumbbell Calf Raise', s:'3–4 × 12–15'},
  ]},
};
// Weekly template: 0=Sun ... 6=Sat. PHUL classic = Mon/Tue/Thu/Fri
const DEFAULT_SCHEDULE = {1:'upperPower',2:'lowerPower',4:'upperHyper',5:'lowerHyper'};
const clone = o => JSON.parse(JSON.stringify(o));
function getProgram(){ const p=DB.get('program',null); return (p&&Object.keys(p).length)? p : clone(DEFAULT_PROGRAM); }
function saveProgram(p){ DB.set('program', p); }
function progDay(wid){ return getProgram()[wid]||null; }
function dayLabel(wid){ if(wid==='hike')return'Hike day'; if(wid==='rest')return'Rest day'; const d=progDay(wid); return d?d.name:'Rest day'; }

/* ---------- settings ---------- */
const defaults = {
  schedule: DEFAULT_SCHEDULE,
  cal:2600, protein:180, carbs:280, fat:75, water:10,
  supps:[{id:'creatine',name:'Creatine',dose:'5 g'},{id:'fishoil',name:'Fish Oil',dose:'1–2 g EPA/DHA'}]
};
function settings(){ return Object.assign({}, defaults, DB.get('settings',{})); }
function saveSettings(s){ DB.set('settings', s); }

/* logs: workout logs keyed by date; diet keyed by date */
function wlog(k){ return DB.get('wlog.'+k, null); }
function saveWlog(k,v){ DB.set('wlog.'+k, v); }
function dietLog(k){ return DB.get('diet.'+k, {meals:[],water:0,supps:{}}); }
function saveDiet(k,v){ DB.set('diet.'+k, v); }

/* find most recent previous performance for an exercise name */
function lastPerf(name, beforeKey){
  const keys = Object.keys(localStorage).filter(k=>k.startsWith('phul.wlog.'))
    .map(k=>k.replace('phul.wlog.','')).sort().reverse();
  for(const k of keys){
    if(k>=beforeKey) continue;
    const log=wlog(k); if(!log||!log.ex) continue;
    const e=log.ex.find(x=>x.n===name && x.sets&&x.sets.some(s=>s.w||s.r));
    if(e){ const best=e.sets.filter(s=>s.w||s.r); if(best.length) return {date:k, sets:best}; }
  }
  return null;
}

/* ---------- nav ---------- */
let curView='cal';
function go(tab){
  curView=tab;
  ['cal','work','diet','stats'].forEach(t=>{
    document.getElementById('v-'+t).classList.toggle('hide', t!==tab);
    document.querySelector(`nav.tabs [data-tab="${t}"]`).classList.toggle('active', t===tab);
  });
  if(tab==='cal') renderCal();
  if(tab==='work') renderWork();
  if(tab==='diet') renderDiet();
  if(tab==='stats') renderStats();
  window.scrollTo(0,0);
}

/* ============================================================
   CALENDAR
   ============================================================ */
let calCursor=new Date(); calCursor.setDate(1);
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

function workoutForDate(k){
  const log=wlog(k);
  let wid;
  if(log && log.override){ wid=log.override; }            // 'hike','rest', or program id
  else { wid=settings().schedule[keyToDate(k).getDay()]||'rest'; }
  if(wid!=='hike' && wid!=='rest' && !progDay(wid)) wid='rest'; // day was deleted
  return wid;
}

function shiftMonth(n){ calCursor.setMonth(calCursor.getMonth()+n); renderCal(); }

function renderCal(){
  document.getElementById('hTitle').textContent='PHUL';
  document.getElementById('hSub').textContent='Power Hypertrophy Upper Lower';
  // today card
  const tk=todayKey();
  const wid=workoutForDate(tk);
  const log=wlog(tk);
  let body;
  if(wid==='rest'){
    body=`<h2>Rest day 😴</h2><p class="muted small" style="margin:6px 0 12px">No lifting scheduled today. Recover, walk, mobility.</p>
      <button class="btn ghost block sm" onclick="openOverride('${tk}')">Log something anyway</button>`;
  } else if(wid==='hike'){
    body=`<h2>🥾 Hike day</h2><p class="muted small" style="margin:6px 0 12px">Counts as your lower session — solid leg stimulus.</p>
      <button class="btn primary block" onclick="go('work')">Log the hike</button>`;
  } else {
    const w=progDay(wid); const done=log&&log.done;
    const cnt=log? (log.ex||[]).reduce((a,e)=>a+(e.sets||[]).filter(s=>s.done).length,0):0;
    body=`<div class="row between"><div>
        <div class="chip ${w.type==='upper'?'blue':'amber'}">${w.type==='upper'?'UPPER':'LOWER'}</div>
        <h2 style="margin-top:8px">${w.name}</h2>
        <p class="muted small" style="margin-top:4px">${w.ex.length} exercises${cnt?` · ${cnt} sets logged`:''}</p>
      </div>${done?'<span class="check" style="font-size:22px">✓</span>':''}</div>
      <button class="btn primary block" style="margin-top:12px" onclick="go('work')">${cnt?'Continue workout':'Start workout'}</button>
      <button class="btn ghost block sm" style="margin-top:8px" onclick="openOverride('${tk}')">Swap to hike / rest</button>`;
  }
  document.getElementById('todayCard').innerHTML=`<h3>Today · ${keyToDate(tk).toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}</h3>${body}`;

  // grid
  document.getElementById('calMonth').textContent=MONTHS[calCursor.getMonth()]+' '+calCursor.getFullYear();
  const y=calCursor.getFullYear(), m=calCursor.getMonth();
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();
  let html='';
  for(let i=0;i<first;i++){ html+=`<div class="cell out">${prevDays-first+i+1}</div>`; }
  for(let d=1;d<=days;d++){
    const k=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const wid=workoutForDate(k);
    const log=wlog(k);
    const isToday=k===tk;
    let tag='';
    if(wid==='hike') tag='<span class="tag hike"></span>';
    else if(wid!=='rest'){ const ty=progDay(wid).type; tag=`<span class="tag ${ty==='upper'?'up':ty==='lower'?'lo':'oth'}"></span>`; }
    const check=(log&&log.done)?'<span class="check">✓</span>':'';
    html+=`<div class="cell ${isToday?'today':''}" onclick="dayTap('${k}')">${d}${tag}${check}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}

function dayTap(k){
  const wid=workoutForDate(k);
  const d=keyToDate(k).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  let label = dayLabel(wid);
  const ty = (wid!=='rest'&&wid!=='hike') ? progDay(wid).type : null;
  let actions=`<button class="btn primary block" onclick="closeSheet();selWorkDate('${k}')">Open workout log</button>`;
  if(wid==='rest') actions=`<button class="btn block" onclick="closeSheet();openOverride('${k}')">Add a session</button>`;
  openSheet(`<h2>${d}</h2>
    <div class="chip ${wid==='hike'?'acc':wid==='rest'?'':(ty==='upper'?'blue':ty==='lower'?'amber':'purple')}" style="margin-bottom:14px">${label}</div>
    ${actions}
    <button class="btn ghost block sm" style="margin-top:8px" onclick="closeSheet();openOverride('${k}')">Change day type</button>`);
}

function openOverride(k){
  const prog=getProgram();
  const dayBtns=Object.keys(prog).map(id=>`<button class="btn block" onclick="setOverride('${k}','${id}')">${esc(prog[id].name)}</button>`).join('');
  openSheet(`<h2>Set day type</h2><p class="muted small" style="margin-bottom:14px">Override what's scheduled for ${keyToDate(k).toLocaleDateString('en-US',{month:'short',day:'numeric'})}.</p>
    <div class="grid2">${dayBtns}</div>
    <button class="btn block" style="margin-top:10px;background:rgba(61,220,132,.15);color:var(--acc)" onclick="setOverride('${k}','hike')">🥾 Hike (replaces leg day)</button>
    <button class="btn ghost block" style="margin-top:10px" onclick="setOverride('${k}','rest')">Rest day</button>
    <button class="btn ghost block sm" style="margin-top:10px" onclick="clearOverride('${k}')">Back to scheduled</button>`);
}
function setOverride(k,v){ const log=wlog(k)||{}; log.override=v; saveWlog(k,log); closeSheet(); renderCal(); }
function clearOverride(k){ const log=wlog(k); if(log){ delete log.override; saveWlog(k,log);} closeSheet(); renderCal(); }

/* ============================================================
   WORKOUT LOG
   ============================================================ */
let workDate=todayKey();
function selWorkDate(k){ workDate=k; go('work'); }

function renderWork(){
  const k=workDate;
  document.getElementById('hTitle').textContent='Workout';
  document.getElementById('hSub').textContent=keyToDate(k).toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  const v=document.getElementById('v-work');
  const wid=workoutForDate(k);

  if(wid==='rest'){
    v.innerHTML=`<div class="card"><div class="empty"><div class="big">😴</div>Rest day. Nothing scheduled.<br><br>
      <button class="btn block" onclick="openOverride('${k}')">Add a session</button></div></div>`+dateSwitcher(k);
    return;
  }
  if(wid==='hike'){
    const log=wlog(k)||{};
    const h=log.hike||{};
    v.innerHTML=`<div class="card"><h2>🥾 Hike</h2><p class="muted small" style="margin:6px 0 14px">Logged as your lower session.</p>
      <div class="grid2">
        <div class="field"><label>Distance (mi)</label><input id="hkDist" type="number" inputmode="decimal" value="${h.dist||''}" placeholder="0"></div>
        <div class="field"><label>Elevation (ft)</label><input id="hkElev" type="number" inputmode="numeric" value="${h.elev||''}" placeholder="0"></div>
        <div class="field"><label>Duration (min)</label><input id="hkDur" type="number" inputmode="numeric" value="${h.dur||''}" placeholder="0"></div>
        <div class="field"><label>Trail / notes</label><input id="hkNote" value="${h.note||''}" placeholder="Optional"></div>
      </div>
      <button class="btn primary block" onclick="saveHike('${k}')">${log.done?'Update hike ✓':'Save hike'}</button>
    </div>`+dateSwitcher(k);
    return;
  }

  const w=progDay(wid);
  let log=wlog(k);
  if(!log||!log.ex){ log={override:log&&log.override, type:w.type, name:w.name, ex:w.ex.map(e=>({n:e.n,s:e.s,sets:[mkSet(),mkSet(),mkSet()]}))}; saveWlog(k,log); }

  let html=`<div class="card" style="padding:14px 16px">
    <div class="row between"><div>
      <div class="chip ${w.type==='upper'?'blue':w.type==='lower'?'amber':'purple'}">${w.type.toUpperCase()}</div>
      <h2 style="margin-top:6px">${esc(w.name)}</h2></div>
      ${log.done?'<span class="chip acc">Done ✓</span>':''}</div></div>`;

  log.ex.forEach((e,ei)=>{
    const lp=lastPerf(e.n,k);
    let lastTxt='';
    if(lp){ lastTxt=`<div class="last">Last (${keyToDate(lp.date).toLocaleDateString('en-US',{month:'numeric',day:'numeric'})}): ${lp.sets.map(s=>`${s.w||0}×${s.r||0}`).join(', ')}</div>`; }
    let sets=e.sets.map((s,si)=>{
      const prev=lp&&lp.sets[si];
      const wPh=prev&&prev.w?('last '+prev.w):'lbs';
      const rPh=prev&&prev.r?(''+prev.r):'reps';
      return `
      <div class="setrow">
        <div class="sn">${si+1}</div>
        <input type="number" inputmode="decimal" placeholder="${wPh}" value="${s.w||''}" onchange="upd(${ei},${si},'w',this.value)">
        <input type="number" inputmode="numeric" placeholder="${rPh}" value="${s.r||''}" onchange="upd(${ei},${si},'r',this.value)">
        <div class="ck ${s.done?'on':''}" onclick="toggleSet(${ei},${si})">✓</div>
      </div>`; }).join('');
    html+=`<div class="ex">
      <div class="exh"><div><div class="nm">${esc(e.n)}</div><div class="scheme">${esc(e.s||'')}</div>${lastTxt}</div></div>
      <div class="setlbl"><div></div><div>Weight</div><div>Reps</div><div></div></div>
      ${sets}
      <div class="exfoot">
        <button class="btn sm ghost" onclick="addSet(${ei})">+ Set</button>
        ${e.sets.length>1?`<button class="btn sm ghost" onclick="rmSet(${ei})">– Set</button>`:''}
      </div>
    </div>`;
  });

  html+=`<button class="btn primary block" style="margin-top:4px" onclick="finishWorkout('${k}')">${log.done?'Workout saved ✓ — update':'Finish & save workout'}</button>`;
  html+=dateSwitcher(k);
  v.innerHTML=html;
}
function mkSet(){ return {w:'',r:'',done:false}; }
function dateSwitcher(k){
  return `<div class="card" style="margin-top:14px"><div class="row between">
    <button class="btn sm ghost" onclick="stepWorkDate(-1)">‹ Prev day</button>
    <span class="muted small">${k===todayKey()?'Today':keyToDate(k).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
    <button class="btn sm ghost" onclick="stepWorkDate(1)">Next day ›</button>
  </div></div>`;
}
function stepWorkDate(n){ const d=keyToDate(workDate); d.setDate(d.getDate()+n); workDate=todayKey(d); renderWork(); }
function upd(ei,si,f,val){ const log=wlog(workDate); log.ex[ei].sets[si][f]=val; saveWlog(workDate,log); }
function toggleSet(ei,si){ const log=wlog(workDate); const s=log.ex[ei].sets[si]; s.done=!s.done; saveWlog(workDate,log); renderWork(); }
function addSet(ei){ const log=wlog(workDate); log.ex[ei].sets.push(mkSet()); saveWlog(workDate,log); renderWork(); }
function rmSet(ei){ const log=wlog(workDate); if(log.ex[ei].sets.length>1){log.ex[ei].sets.pop();saveWlog(workDate,log);renderWork();} }
function finishWorkout(k){ const log=wlog(k); log.done=true; saveWlog(k,log); toast('Workout saved 💪'); renderWork(); }
function saveHike(k){
  const log=wlog(k)||{override:'hike'};
  log.hike={dist:val('hkDist'),elev:val('hkElev'),dur:val('hkDur'),note:val('hkNote')};
  log.done=true; saveWlog(k,log); toast('Hike saved 🥾'); renderWork();
}
function val(id){ return document.getElementById(id).value; }

/* ============================================================
   DIET
   ============================================================ */
let dietDate=todayKey();
function renderDiet(){
  document.getElementById('hTitle').textContent='Diet';
  document.getElementById('hSub').textContent=keyToDate(dietDate).toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  const s=settings();
  const d=dietLog(dietDate);
  const tot=d.meals.reduce((a,m)=>({cal:a.cal+(+m.cal||0),p:a.p+(+m.p||0),c:a.c+(+m.c||0),f:a.f+(+m.f||0)}),{cal:0,p:0,c:0,f:0});
  const pct=(n,t)=>Math.min(100,Math.round(n/t*100))||0;
  const ringPct=Math.min(100,Math.round(tot.cal/s.cal*100))||0;
  const remain=s.cal-tot.cal;

  let meals = d.meals.length? d.meals.map((m,i)=>`
    <div class="meal" onclick="openMeal(${i})">
      <div><div class="mn">${m.name||'Meal'}</div>
        <div class="mm">${m.p||0}P · ${m.c||0}C · ${m.f||0}F</div></div>
      <div class="cal">${m.cal||0}</div>
    </div>`).join('') : `<div class="empty"><div class="big">🍽️</div>No meals logged yet today.</div>`;

  // water
  let cups='';
  for(let i=0;i<s.water;i++){ cups+=`<div class="cup ${i<d.water?'full':''}" onclick="setWater(${i+1})"></div>`; }

  // supps
  let supps=s.supps.map(su=>`
    <div class="supp"><div><div style="font-weight:600">${su.name}</div><div class="muted tiny">${su.dose}</div></div>
      <div class="toggle ${d.supps[su.id]?'on':''}" onclick="toggleSupp('${su.id}')"></div></div>`).join('');

  document.getElementById('v-diet').innerHTML=`
    <div class="card">
      <div class="ring-wrap">${ring(ringPct, tot.cal, s.cal)}</div>
      <div class="row between" style="margin-bottom:14px">
        <div class="stat"><div class="n">${tot.cal}</div><div class="l">Eaten</div></div>
        <div class="stat"><div class="n" style="color:${remain<0?'var(--red)':'var(--acc)'}">${remain}</div><div class="l">${remain<0?'Over':'Left'}</div></div>
        <div class="stat"><div class="n">${s.cal}</div><div class="l">Target</div></div>
      </div>
      ${macro('Protein',tot.p,s.protein,'var(--acc)')}
      ${macro('Carbs',tot.c,s.carbs,'var(--blue)')}
      ${macro('Fat',tot.f,s.fat,'var(--amber)')}
    </div>

    <div class="card">
      <div class="row between"><h3 style="margin:0">Meals</h3><button class="btn sm primary" onclick="openMeal(-1)">+ Add</button></div>
      <div style="margin-top:6px">${meals}</div>
    </div>

    <div class="card">
      <h3>Water · ${d.water}/${s.water} cups</h3>
      <div class="water">${cups}</div>
    </div>

    <div class="card"><h3>Supplements</h3>${supps}</div>

    <div class="card"><div class="row between">
      <button class="btn sm ghost" onclick="stepDiet(-1)">‹ Prev</button>
      <span class="muted small">${dietDate===todayKey()?'Today':keyToDate(dietDate).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
      <button class="btn sm ghost" onclick="stepDiet(1)">Next ›</button>
    </div></div>`;
}
function macro(lbl,n,t,col){ const p=Math.min(100,Math.round(n/t*100))||0;
  return `<div class="macro"><div class="lbl"><span>${lbl}</span><span><b>${n}</b><span class="muted"> / ${t} g</span></span></div>
    <div class="bar"><i style="width:${p}%;background:${col}"></i></div></div>`; }
function ring(pct,cal,target){
  const r=52,c=2*Math.PI*r,off=c-(pct/100)*c;
  return `<svg width="150" height="150" viewBox="0 0 130 130">
    <circle cx="65" cy="65" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="11"/>
    <circle cx="65" cy="65" r="${r}" fill="none" stroke="var(--acc)" stroke-width="11" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 65 65)"/>
    <text x="65" y="60" text-anchor="middle" fill="var(--txt)" font-size="26" font-weight="800">${pct}%</text>
    <text x="65" y="80" text-anchor="middle" fill="var(--mut)" font-size="11">of ${target} kcal</text>
  </svg>`;
}
function stepDiet(n){ const d=keyToDate(dietDate); d.setDate(d.getDate()+n); dietDate=todayKey(d); renderDiet(); }
function setWater(n){ const d=dietLog(dietDate); d.water = (d.water===n)?n-1:n; saveDiet(dietDate,d); renderDiet(); }
function toggleSupp(id){ const d=dietLog(dietDate); d.supps[id]=!d.supps[id]; saveDiet(dietDate,d); renderDiet(); }

function openMeal(i){
  const d=dietLog(dietDate);
  const m = i>=0? d.meals[i] : {name:'',cal:'',p:'',c:'',f:''};
  openSheet(`<h2>${i>=0?'Edit meal':'Add meal'}</h2>
    <div class="grid2" style="margin-bottom:14px">
      <button class="btn" style="background:rgba(74,163,255,.15);color:var(--blue)" onclick="openScanner()">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-3px"><path d="M3 5v14M7 5v14M11 5v14M15 5v14M19 5v14M21 5v14"/></svg>
        Scan</button>
      <button class="btn" style="background:rgba(184,148,255,.15);color:var(--purple)" onclick="openFoodSearch()">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-3px"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        Search</button>
    </div>
    <div class="field"><label>Name</label><input id="mName" value="${m.name||''}" placeholder="e.g. Chicken & rice"></div>
    <div class="field"><label>Calories</label><input id="mCal" type="number" inputmode="numeric" value="${m.cal||''}" placeholder="kcal"></div>
    <div class="grid3">
      <div class="field"><label>Protein g</label><input id="mP" type="number" inputmode="numeric" value="${m.p||''}"></div>
      <div class="field"><label>Carbs g</label><input id="mC" type="number" inputmode="numeric" value="${m.c||''}"></div>
      <div class="field"><label>Fat g</label><input id="mF" type="number" inputmode="numeric" value="${m.f||''}"></div>
    </div>
    <button class="btn primary block" onclick="saveMeal(${i})">${i>=0?'Save changes':'Add meal'}</button>
    ${i>=0?`<button class="btn danger block" style="margin-top:8px" onclick="delMeal(${i})">Delete meal</button>`:''}`);
}
function saveMeal(i){
  const d=dietLog(dietDate);
  const m={name:val('mName')||'Meal',cal:+val('mCal')||0,p:+val('mP')||0,c:+val('mC')||0,f:+val('mF')||0};
  if(i>=0) d.meals[i]=m; else d.meals.push(m);
  saveDiet(dietDate,d); closeSheet(); renderDiet();
}
function delMeal(i){ const d=dietLog(dietDate); d.meals.splice(i,1); saveDiet(dietDate,d); closeSheet(); renderDiet(); }

/* ---------- barcode scanner (ZXing + Open Food Facts) ---------- */
let _scanReader=null;
function setScanStatus(t){ const e=document.getElementById('scanStatus'); if(e) e.textContent=t; }
function openScanner(){
  if(!document.getElementById('mName')) openMeal(-1); // ensure meal form is the target
  document.getElementById('scanOverlay').classList.remove('hide');
  startLiveScan();
}
function startLiveScan(){
  setScanStatus('Starting camera…');
  if(typeof ZXing==='undefined'){ setScanStatus('Couldn’t load scanner — use 📷 Photo or ⌨︎ Enter # below.'); return; }
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){ setScanStatus('Live camera unavailable — use 📷 Photo or ⌨︎ Enter #.'); return; }
  try{
    _scanReader=new ZXing.BrowserMultiFormatReader();
    _scanReader.decodeFromConstraints({video:{facingMode:{ideal:'environment'}}},'scanVideo',(res)=>{
      if(res) onBarcode(res.getText());
    }).catch(()=>{ setScanStatus('Camera blocked. Allow it in Safari, or use 📷 Photo / ⌨︎ Enter #.'); });
    setScanStatus('Point at a barcode — or use 📷 Photo / ⌨︎ Enter #.');
  }catch(e){ setScanStatus('Camera error — use 📷 Photo or ⌨︎ Enter #.'); }
}
function onBarcode(code){ stopScanner(); setScanStatus('Found '+code+' — looking up…'); lookupBarcode(code); }
function scanPhoto(file){
  if(!file) return; setScanStatus('Reading photo…');
  if(typeof ZXing==='undefined'){ setScanStatus('Scanner not loaded — try ⌨︎ Enter #.'); return; }
  const url=URL.createObjectURL(file);
  new ZXing.BrowserMultiFormatReader().decodeFromImageUrl(url)
    .then(res=>{ URL.revokeObjectURL(url); onBarcode(res.getText()); })
    .catch(()=>{ URL.revokeObjectURL(url); setScanStatus('No barcode found in that photo. Get it sharp & centered, or ⌨︎ Enter #.'); });
}
function manualBarcode(){ const code=prompt('Type the barcode number (the digits under the bars):'); if(code&&code.trim()) onBarcode(code.trim()); }
function stopScanner(){ if(_scanReader){ try{_scanReader.reset();}catch(e){} _scanReader=null; } }
function closeScanner(){ stopScanner(); document.getElementById('scanOverlay').classList.add('hide'); }
function num(v){ return v==null||isNaN(v)?'':Math.round(+v); }
function lookupBarcode(code){
  const url=`https://world.openfoodfacts.org/api/v2/product/${code}.json?fields=product_name,brands,serving_size,serving_quantity,nutriments`;
  return fetch(url).then(r=>{ if(!r.ok) throw new Error('net'); return r.json(); }).then(d=>{
    if(d.status!==1||!d.product){ setScanStatus('Barcode '+code+' isn’t in the food database — type the macros in by hand.'); setTimeout(closeScanner,2200); return; }
    const p=d.product, n=p.nutriments||{};
    const nm=[ (p.brands||'').split(',')[0].trim(), p.product_name||'' ].filter(Boolean).join(' ').trim()||('Item '+code);
    closeScanner();
    openPortion(buildFood(n, nm, p.serving_size, p.serving_quantity));
  }).catch(()=>{ setScanStatus('Lookup failed — check your connection and try again.'); setTimeout(closeScanner,2200); });
}
function fillMeal(m){
  if(!document.getElementById('mName')) openMeal(-1);
  const set=(id,v)=>{ const e=document.getElementById(id); if(e&&v!=='') e.value=v; };
  set('mName',m.name); set('mCal',m.cal); set('mP',m.p); set('mC',m.c); set('mF',m.f);
}
function esc(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------- food-name search (Open Food Facts, no key) ---------- */
function openFoodSearch(){
  openSheet(`<h2>Search food</h2>
    <div class="field"><input id="fsQuery" placeholder="e.g. banana, chicken breast" oninput="debouncedSearch()" autocomplete="off"></div>
    <div id="fsResults"><p class="muted small">Search whole foods (“chicken breast”) or dishes (“chicken sandwich”). Data: USDA FoodData Central.</p></div>
    <button class="btn ghost block sm" style="margin-top:12px" onclick="openMeal(-1)">‹ Back to manual entry</button>`);
  setTimeout(()=>{ const q=document.getElementById('fsQuery'); if(q) q.focus(); },150);
}
let _fsTimer=null, _fsCache={};
function debouncedSearch(){ clearTimeout(_fsTimer); _fsTimer=setTimeout(searchFood,500); }
// generic (whole foods + dishes) first, then a few deduped branded products
function fdcOrder(foods){
  const seen=new Set(); const generic=[], branded=[];
  foods.forEach(f=>{ if(!f||!f.name) return;
    const key=f.name.toLowerCase().replace(/\s+/g,' ').trim(); if(seen.has(key)) return; seen.add(key);
    (f.dt==='Branded'?branded:generic).push(f); });
  return generic.slice(0,12).concat(branded.slice(0,6));
}
function fsRender(foods){
  const box=document.getElementById('fsResults'); if(!box) return;
  if(!foods.length){ box.innerHTML='<p class="muted small">No matches. Try a simpler term, scan a barcode, or enter manually.</p>'; return; }
  _fsCache={};
  const hasGeneric=foods.some(f=>f.dt&&f.dt!=='Branded');
  let html='', brandedShown=false;
  foods.forEach((f,i)=>{
    _fsCache[i]=f;
    if(hasGeneric && f.dt==='Branded' && !brandedShown){
      html+='<div class="muted tiny" style="margin:12px 2px 4px;text-transform:uppercase;letter-spacing:.5px">Branded products</div>';
      brandedShown=true;
    }

function searchFood(){
  const qEl=document.getElementById('fsQuery'); if(!qEl) return;
  const q=qEl.value.trim(); const box=document.getElementById('fsResults');
  if(q.length<2){ box.innerHTML='<p class="muted small">Type at least 2 letters…</p>'; return; }
  box.innerHTML='<p class="muted small">Searching…</p>';
  const key=settings().fdcKey||'DEMO_KEY';
  const url=`https://api.nal.usda.gov/fdc/v1/foods/search?api_key=${encodeURIComponent(key)}&query=${encodeURIComponent(q)}&pageSize=50&requireAllWords=false&dataType=${encodeURIComponent('Foundation,SR Legacy,Survey (FNDDS),Branded')}`;
  return fetch(url).then(r=>{
      if(r.status===429||r.status===403){ const e=new Error('rate'); e.rate=true; e.online=true; throw e; }
      if(!r.ok){ const e=new Error('http'); e.online=true; throw e; } // server replied = we're online
      return r.json();
    }).then(d=>{
      if(!document.getElementById('fsResults')) return;
      const foods=(d.foods||[]).map(buildFoodFromFDC).filter(f=>f && ((f.per100&&f.per100.cal)||(f.serving&&f.serving.cal)));
      if(foods.length){ fsRender(fdcOrder(foods)); return; }
      return searchFoodOFF(q, {online:true});      // USDA reachable, just no hits
    }).catch(err=>{
      return searchFoodOFF(q, {online:!!(err&&err.online), rate:!!(err&&err.rate)});
    });
}
function fsNoResults(q,opts){ const b=document.getElementById('fsResults'); if(!b) return;

}
function fsOffline(){ const b=document.getElementById('fsResults'); if(b) b.innerHTML='<p class="muted small">Couldn’t reach the food database — check your connection and try again.</p>'; }
function buildFoodFromFDC(item){
  if(!item) return null;
  const fn=item.foodNutrients||[];
  const byNum=(...nums)=>{ const f=fn.find(x=>nums.includes(String(x.nutrientNumber))||nums.includes(String(x.nutrientId))); return f? +f.value : null; };
  let cal=byNum('208','1008');
  if(cal==null){ const e=fn.find(x=>(x.unitName||'').toUpperCase()==='KCAL'); cal=e?+e.value:null; }
  const per100={ cal:cal!=null?cal:0, p:byNum('203','1003')||0, c:byNum('205','1005')||0, f:byNum('204','1004')||0 };
  let serving=null;
  if(item.servingSize && /^(g|ml|grm|mlt)$/i.test(item.servingSizeUnit||'')){
    const factor=item.servingSize/100;
    serving={ cal:per100.cal*factor, p:per100.p*factor, c:per100.c*factor, f:per100.f*factor,
      label:item.householdServingFullText||`${item.servingSize} ${item.servingSizeUnit}`, grams:item.servingSize };
  }
  const brand=(item.brandName||item.brandOwner||'').trim();
  let nm=(item.description||'').trim().replace(/\s+/g,' ');
  // standard foods are SHOUTED in FDC; title-case them so they read nicely
  if(item.dataType!=='Branded' && nm===nm.toUpperCase()) nm=nm.toLowerCase().replace(/(^|\s|,)\w/g,c=>c.toUpperCase());
  if(brand){ const b=brand.toLowerCase().replace(/(^|\s)\w/g,c=>c.toUpperCase()); nm=nm+' ('+b+')'; }
  const volServing = serving && /\b(cup|cups|ml|fl)\b/i.test(serving.label||'');
  return { name:nm, serving, per100, volServing, dt:item.dataType||'' };
}
function searchFoodOFF(q, opts){
  opts=opts||{};
  const url=`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=20&fields=product_name,brands,nutriments,serving_size,serving_quantity`;
  return fetch(url).then(r=>{ if(!r.ok) throw new Error('http'); return r.json(); }).then(d=>{
    const foods=(d.products||[]).filter(p=>p.product_name && p.nutriments &&
      (p.nutriments['energy-kcal_serving']!=null||p.nutriments['energy-kcal_100g']!=null))
      .map(p=>{ const nm=[ (p.brands||'').split(',')[0].trim(), p.product_name ].filter(Boolean).join(' ').trim();
        return buildFood(p.nutriments, nm, p.serving_size, p.serving_quantity); });
    if(foods.length){ fsRender(foods); return; }
    fsNoResults(q, opts);                 // both sources returned nothing
  }).catch(()=>{
    if(opts.online) fsNoResults(q, opts); // we know we're online (USDA replied) → it's a no-result
    else fsOffline();                     // both failed at the network level → offline
  });
}

function buildFood(n, name, serving_size, serving_qty){
  const hasS = n['energy-kcal_serving']!=null||n['proteins_serving']!=null;
  const has100 = n['energy-kcal_100g']!=null||n['proteins_100g']!=null;
  const serving = hasS? {cal:+n['energy-kcal_serving']||0,p:+n['proteins_serving']||0,c:+n['carbohydrates_serving']||0,f:+n['fat_serving']||0,label:serving_size||'',grams:+serving_qty||null} : null;
  const per100 = has100? {cal:+n['energy-kcal_100g']||0,p:+n['proteins_100g']||0,c:+n['carbohydrates_100g']||0,f:+n['fat_100g']||0} : null;
  // offer cups only if the product's own serving is volume-based (cup/ml)
  const volServing = serving && /\b(cup|cups|ml|fl)\b/i.test(serving.label||'');
  return {name, serving, per100, volServing};
}

/* adherence over the last `days` days vs the defined plan + targets */
function adherence(days){
  const s=settings(); let schedDays=0, doneDays=0;
  let calSum=0, pSum=0, cSum=0, fSum=0, waterSum=0, tracked=0;
  const d=new Date(); d.setDate(d.getDate()-(days-1));
  for(let i=0;i<days;i++){ const k=todayKey(d);
    const sched=workoutForDate(k); const l=wlog(k);
    if(sched!=='rest'){ schedDays++; if(l&&l.done) doneDays++; }
    const dl=dietLog(k);
    if(dl.meals.length){ tracked++;
      calSum+=dl.meals.reduce((a,m)=>a+(+m.cal||0),0);
      pSum+=dl.meals.reduce((a,m)=>a+(+m.p||0),0);
      cSum+=dl.meals.reduce((a,m)=>a+(+m.c||0),0);
      fSum+=dl.meals.reduce((a,m)=>a+(+m.f||0),0);
      waterSum+=dl.water||0;
    }
    d.setDate(d.getDate()+1);
  }
  return { schedDays, doneDays, tracked,
    avgCal: tracked?Math.round(calSum/tracked):0, avgP: tracked?Math.round(pSum/tracked):0,
    avgC: tracked?Math.round(cSum/tracked):0, avgF: tracked?Math.round(fSum/tracked):0,

}

function epley(w,r){ r=+r||1; return r<=1? +w : +w*(1+r/30); }
function stdAt(key,sex,bw){
  const rows=STD[key][sex]; if(!rows) return null;
  if(bw<=rows[0][0]) return rows[0].slice(1);
  if(bw>=rows[rows.length-1][0]) return rows[rows.length-1].slice(1);
  for(let i=0;i<rows.length-1;i++){ if(bw>=rows[i][0]&&bw<=rows[i+1][0]){
    const t=(bw-rows[i][0])/(rows[i+1][0]-rows[i][0]);
    return [1,2,3,4,5].map(j=>Math.round(rows[i][j]+t*(rows[i+1][j]-rows[i][j])));
  }}
  return rows[rows.length-1].slice(1);
}
function classify(e1rm,th){ // th=[beg,nov,int,adv,elite]
  let idx=0;
  if(e1rm>=th[4])idx=5; else if(e1rm>=th[3])idx=4; else if(e1rm>=th[2])idx=3; else if(e1rm>=th[1])idx=2; else if(e1rm>=th[0])idx=1;
  const lo= idx===0?0:th[idx-1], hi= idx>=5?th[4]:th[idx];
  const pct= idx>=5?100:Math.max(0,Math.min(100,Math.round((e1rm-lo)/(hi-lo)*100)));
  return {level:LEVELS[idx], idx, next:idx>=5?null:LEVELS[idx+1], nextAt:idx>=5?null:th[idx], pct};
}
function bestForLift(key){

  wkeysAll().forEach(k=>{ const l=wlog(k); if(!l||!l.ex) return;

      e.sets.forEach(s=>{ if(s.done&&+s.w>0){ const e1=epley(s.w,s.r);
        if(!best||e1>best.e1){ best={e1:Math.round(e1), w:+s.w, r:+s.r||1, name:e.n}; } } });
    });
  });
  return best;
}

        Benchmarks compare your lifts to real strength standards by bodyweight.<br><br>
        Add your bodyweight & sex to turn it on.</div>
        <button class="btn primary block" onclick="openSettings()">Add body stats</button></div>`;
    return;
  }
  const keys=['bench','squat','deadlift','ohp'];
  let cards=keys.map(key=>{
    const b=bestForLift(key); const th=stdAt(key,s.sex,s.bw);
    if(!b){ return `<div class="card"><div class="row between"><b>${STD[key].label}</b><span class="chip">No data</span></div>
      <p class="muted tiny" style="margin-top:6px">Log a ${STD[key].label.toLowerCase()} set to rank it.</p></div>`; }
    const c=classify(b.e1,th);
    const toNext = c.next? Math.max(0, c.nextAt-b.e1):0;
    return `<div class="card">
      <div class="row between"><b>${STD[key].label}</b>
        <span class="chip" style="background:${LEVEL_COLOR[c.idx]}22;color:${LEVEL_COLOR[c.idx]}">${c.level}</span></div>
      <div class="muted small" style="margin:6px 0 2px">Est. 1RM <b style="color:var(--txt)">${b.e1} lb</b> <span class="muted">(${b.w}×${b.r})</span></div>
      <div class="bar"><i style="width:${c.pct}%;background:${LEVEL_COLOR[c.idx]}"></i></div>
      <div class="tiny muted" style="margin-top:5px">${c.next? `${toNext} lb to ${c.next} (${c.nextAt} lb)` : 'Elite — top of the chart 🏆'}</div>
    </div>`;
  }).join('');

  // diet + training adherence vs plan
  const a=adherence(7);
  const trainPct = a.schedDays? Math.round(a.doneDays/a.schedDays*100):0;
  const adh=(v,t)=> t? Math.min(150,Math.round(v/t*100)):0;
  const arow=(lbl,v,t,unit)=>{ const p=adh(v,t); return `<div class="macro"><div class="lbl"><span>${lbl}</span>
      <span><b>${v}</b><span class="muted"> / ${t}${unit||''} · ${p}%</span></span></div>
      <div class="bar"><i style="width:${Math.min(100,p)}%;background:${p>=90&&p<=110?'var(--acc)':p<90?'var(--amber)':'var(--red)'}"></i></div></div>`; };

  document.getElementById('v-stats').innerHTML= statsToggle()+`
    <p class="muted small" style="margin:-4px 2px 12px">Strength standards from Strength Level, matched to your bodyweight (${s.bw} lb, ${s.sex}). 1RM estimated from your best set.</p>
    ${cards}
    <div class="card"><h3>Training adherence (last 7 days)</h3>
      <div class="macro"><div class="lbl"><span>Scheduled sessions done</span><span><b>${a.doneDays}</b><span class="muted"> / ${a.schedDays} · ${trainPct}%</span></span></div>
        <div class="bar"><i style="width:${trainPct}%;background:${trainPct>=80?'var(--acc)':'var(--amber)'}"></i></div></div>
    </div>
    <div class="card"><h3>Diet vs targets (avg of ${a.tracked} tracked day${a.tracked===1?'':'s'})</h3>
      ${a.tracked? arow('Calories',a.avgCal,a.t.cal,'')+arow('Protein',a.avgP,a.t.p,' g')+arow('Carbs',a.avgC,a.t.c,' g')+arow('Fat',a.avgF,a.t.f,' g')+arow('Water',a.avgWater,a.t.water,' cups')
        : '<p class="muted small">No meals tracked in the last 7 days.</p>'}
    </div>
    <div class="card"><p class="tiny muted">Levels: Beginner (top 95%) · Novice (80%) · Intermediate (50%) · Advanced (20%) · Elite (5%). Estimates only — not a substitute for a true tested 1RM.</p></div>`;
}

function openSettings(){
  const s=settings();
  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const prog=getProgram();
  const opts=[['rest','Rest']].concat(Object.keys(prog).map(id=>[id,prog[id].name])).concat([['hike','Hike']]);
  let sched=dayNames.map((dn,i)=>{
    const cur=s.schedule[i]||'rest';
    return `<div class="field"><label>${dn}</label><select id="sc${i}">${opts.map(o=>`<option value="${o[0]}" ${o[0]===cur?'selected':''}>${esc(o[1])}</option>`).join('')}</select></div>`;
  }).join('');
  openSheet(`<h2>Settings</h2>
    <h3 style="margin:6px 0 10px">Body stats (for benchmarks)</h3>
    <div class="grid3">
      <div class="field"><label>Bodyweight (lb)</label><input id="stBw" type="number" inputmode="numeric" value="${s.bw||''}" placeholder="—"></div>
      <div class="field"><label>Sex</label><select id="stSex"><option value="" ${!s.sex?'selected':''}>—</option><option value="male" ${s.sex==='male'?'selected':''}>Male</option><option value="female" ${s.sex==='female'?'selected':''}>Female</option></select></div>
      <div class="field"><label>Age</label><input id="stAge" type="number" inputmode="numeric" value="${s.age||''}" placeholder="—"></div>
    </div>
    <div class="field"><label>FoodData Central key (optional, free)</label><input id="stFdc" value="${esc(s.fdcKey||'')}" placeholder="DEMO_KEY (works, but limited)"></div>
    <h3 style="margin:10px 0 10px">Daily nutrition targets</h3>
    <div class="grid2">
      <div class="field"><label>Calories</label><input id="stCal" type="number" inputmode="numeric" value="${s.cal}"></div>
      <div class="field"><label>Water (cups)</label><input id="stWater" type="number" inputmode="numeric" value="${s.water}"></div>
      <div class="field"><label>Protein g</label><input id="stP" type="number" inputmode="numeric" value="${s.protein}"></div>
      <div class="field"><label>Carbs g</label><input id="stC" type="number" inputmode="numeric" value="${s.carbs}"></div>
      <div class="field"><label>Fat g</label><input id="stF" type="number" inputmode="numeric" value="${s.fat}"></div>
    </div>
    <h3 style="margin:14px 0 10px">Weekly training split</h3>
    <p class="muted small" style="margin-bottom:10px">Assign each weekday a training day, Rest, or Hike. Edit the days/lifts themselves below.</p>
    ${sched}
    <button class="btn ghost block sm" style="margin-bottom:6px" onclick="openProgramEditor()">Edit training days & lifts ›</button>
    <button class="btn primary block" style="margin-top:6px" onclick="saveSettingsForm()">Save settings</button>`);
}
function saveSettingsForm(){
  const s=settings();
  s.bw=+val('stBw')||null; s.sex=val('stSex')||null; s.age=+val('stAge')||null; s.fdcKey=val('stFdc').trim()||null;
  s.cal=+val('stCal')||2600; s.water=+val('stWater')||10;
  s.protein=+val('stP')||180; s.carbs=+val('stC')||280; s.fat=+val('stF')||75;
  const sched={};
  for(let i=0;i<7;i++){ const v=document.getElementById('sc'+i).value; if(v!=='rest') sched[i]=v; }
  s.schedule=sched;
  saveSettings(s); closeSheet(); toast('Settings saved'); renderStats();
}

/* ---------- program editor ---------- */
function openProgramEditor(){
  const prog=getProgram(); const ids=Object.keys(prog);
  const rows=ids.map(id=>{ const d=prog[id];
    return `<div class="card" style="padding:12px"><div class="row between">
      <div><div style="font-weight:700">${esc(d.name)}</div>
        <div class="muted tiny" style="text-transform:capitalize">${esc(d.type)} · ${d.ex.length} lifts</div></div>
      <div class="row" style="gap:6px">
        <button class="btn sm ghost" onclick="editDay('${id}')">Edit</button>
        <button class="btn sm danger" onclick="delDay('${id}')">✕</button>
      </div></div></div>`; }).join('');
  openSheet(`<h2>Training days</h2>
    <p class="muted small" style="margin-bottom:12px">Rename days, swap lifts, or build your own split. Assign them to weekdays in Settings.</p>
    ${rows}
    <button class="btn ghost block sm" onclick="editDay(null)">+ Add new day</button>
    <button class="btn ghost block sm" style="margin-top:8px" onclick="resetProgram()">Reset to default PHUL</button>
    <button class="btn primary block" style="margin-top:14px" onclick="openSettings()">‹ Back to settings</button>`);
}
let _editDayId=null, _editDay=null;
function editDay(id){
  const prog=getProgram();
  if(id){ _editDayId=id; _editDay=clone(prog[id]); }
  else { _editDayId='day_'+Date.now(); _editDay={name:'New Day',type:'upper',ex:[{n:'',s:'3 × 8–12'}]}; }
  renderDayEditor();
}
function renderDayEditor(){
  const d=_editDay;
  const exRows=d.ex.map((e,i)=>`
    <div class="card" style="padding:10px;margin-bottom:8px">
      <input style="width:100%;background:var(--bg3);border:1px solid var(--line);border-radius:10px;padding:10px;color:var(--txt);margin-bottom:8px" placeholder="Exercise name" value="${esc(e.n)}" oninput="_editDay.ex[${i}].n=this.value">
      <div class="row" style="gap:8px">
        <input style="flex:1;background:var(--bg3);border:1px solid var(--line);border-radius:10px;padding:10px;color:var(--txt)" placeholder="Sets × reps e.g. 3 × 8–12" value="${esc(e.s||'')}" oninput="_editDay.ex[${i}].s=this.value">
        <button class="btn sm danger" onclick="rmDayEx(${i})">✕</button>
      </div></div>`).join('');
  openSheet(`<h2>${_editDayId&&getProgram()[_editDayId]?'Edit day':'New day'}</h2>
    <div class="field"><label>Day name</label><input value="${esc(d.name)}" oninput="_editDay.name=this.value"></div>
    <div class="field"><label>Type (for color & benchmarks)</label>
      <select onchange="_editDay.type=this.value">
        <option value="upper" ${d.type==='upper'?'selected':''}>Upper</option>
        <option value="lower" ${d.type==='lower'?'selected':''}>Lower</option>
        <option value="other" ${d.type==='other'?'selected':''}>Other / Full body</option>
      </select></div>
    <h3 style="margin:10px 0">Exercises</h3>
    <div id="edExList">${exRows}</div>
    <button class="btn ghost block sm" onclick="addDayEx()">+ Add exercise</button>
    <button class="btn primary block" style="margin-top:14px" onclick="saveDay()">Save day</button>
    <button class="btn ghost block sm" style="margin-top:8px" onclick="openProgramEditor()">‹ Cancel</button>`);
}
function addDayEx(){ _editDay.ex.push({n:'',s:'3 × 8–12'}); renderDayEditor(); }
function rmDayEx(i){ _editDay.ex.splice(i,1); if(!_editDay.ex.length)_editDay.ex.push({n:'',s:''}); renderDayEditor(); }
function saveDay(){
  _editDay.ex=_editDay.ex.filter(e=>(e.n||'').trim());
  if(!_editDay.name.trim()){ alert('Give the day a name.'); return; }
  if(!_editDay.ex.length){ alert('Add at least one exercise.'); return; }
  const prog=getProgram(); prog[_editDayId]=_editDay; saveProgram(prog);
  toast('Day saved'); openProgramEditor();
}
function delDay(id){
  const prog=getProgram();
  if(Object.keys(prog).length<=1){ alert('Keep at least one training day.'); return; }
  if(!confirm('Delete this day? Past logged workouts are kept.')) return;
  delete prog[id]; saveProgram(prog);
  const s=settings(); let changed=false;
  Object.keys(s.schedule).forEach(k=>{ if(s.schedule[k]===id){ delete s.schedule[k]; changed=true; } });
  if(changed) saveSettings(s);
  openProgramEditor();
}
function resetProgram(){
  if(!confirm('Reset training days to the default PHUL plan? Your logged history stays.')) return;
  saveProgram(clone(DEFAULT_PROGRAM));
  const s=settings(); s.schedule=Object.assign({},DEFAULT_SCHEDULE); saveSettings(s);
  toast('Reset to PHUL'); openProgramEditor();
}
function exportData(){
  const data={}; Object.keys(localStorage).filter(k=>k.startsWith('phul.')).forEach(k=>data[k]=localStorage.getItem(k));
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='phul-backup-'+todayKey()+'.json'; a.click();
}
function importData(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json,.json';
  inp.onchange=()=>{ const f=inp.files[0]; if(!f) return; const r=new FileReader();
    r.onload=()=>{ try{ const data=JSON.parse(r.result);
        const keys=Object.keys(data).filter(k=>k.startsWith('phul.'));
        if(!keys.length){ alert('That file is not a PHUL backup.'); return; }
        if(!confirm('Restore this backup? It overwrites current data on this device.')) return;
        Object.keys(localStorage).filter(k=>k.startsWith('phul.')).forEach(k=>localStorage.removeItem(k));
        keys.forEach(k=>localStorage.setItem(k, data[k]));
        toast('Backup restored ✓'); go('cal');
      }catch(e){ alert('That file could not be read as a PHUL backup.'); } };
    r.readAsText(f); };
  inp.click();
}
function wipe(){ if(confirm('Delete ALL workout and diet data on this device? This cannot be undone.')){ Object.keys(localStorage).filter(k=>k.startsWith('phul.')).forEach(k=>localStorage.removeItem(k)); toast('Data reset'); go('cal'); } }

/* ============================================================
   sheet + toast
   ============================================================ */
function openSheet(html){ const s=document.getElementById('sheet'); s.innerHTML='<div class="grab"></div>'+html;
  document.getElementById('backdrop').classList.add('show'); s.classList.add('show'); }
function closeSheet(){ document.getElementById('backdrop').classList.remove('show'); document.getElementById('sheet').classList.remove('show'); }
function toast(msg){ let t=document.getElementById('toast'); if(!t){ t=document.createElement('div'); t.id='toast';
  t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--txt);padding:11px 18px;border-radius:12px;border:1px solid var(--line);z-index:80;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.4);transition:opacity .3s'; document.body.appendChild(t);}
  t.textContent=msg; t.style.opacity='1'; clearTimeout(t._t); t._t=setTimeout(()=>t.style.opacity='0',1600); }

/* ---------- init ---------- */
go('cal');

/* ---------- PWA service worker ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
